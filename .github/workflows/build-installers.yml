name: Build and Release Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            id: windows
            name: Windows
          - os: macos-latest
            arch: arm64
            id: mac-silicon
            name: macOS-Silicon
          - os: macos-latest
            arch: x64
            id: mac-intel
            name: macOS-Intel
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          architecture: ${{ matrix.arch }}

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Package Mac Application
        if: matrix.id != 'windows'
        run: |
          if [ "${{ matrix.id }}" == "mac-intel" ]; then
            npx electron-builder --mac zip --${{ matrix.arch }} --publish never
          else
            npx electron-builder --mac --${{ matrix.arch }} --publish never
          fi

      - name: Package Windows Application
        if: matrix.id == 'windows'
        run: npx electron-builder --win --${{ matrix.arch }} --publish never

      - name: Upload macOS Artifact
        if: matrix.id != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ReseolabX-${{ matrix.name }}
          path: |
            release/*.dmg
            release/*.zip
          
      - name: Upload Windows Artifact
        if: matrix.id == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ReseolabX-${{ matrix.name }}
          path: release/*.exe
